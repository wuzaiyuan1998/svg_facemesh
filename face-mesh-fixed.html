<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPipe Face Mesh - 修复版</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 { color: white; margin-bottom: 10px; }
    .subtitle { color: #e0e7ff; margin-bottom: 20px; font-size: 14px; }
    
    .container {
      position: relative;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    video {
      display: block;
      transform: scaleX(-1);
    }
    
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      transform: scaleX(-1);
    }
    
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    
    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #10b981;
      color: white;
      font-weight: bold;
    }
    
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    
    #status {
      color: #ffd700;
      margin: 15px 0;
      font-size: 14px;
      text-align: center;
    }
    
    #fps {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      padding: 5px 10px;
      border-radius: 5px;
      font-family: monospace;
      z-index: 10;
    }
  </style>
</head>
<body>
  <h1>🎭 MediaPipe Face Mesh</h1>
  <div class="subtitle">修复版 - 正确的坐标映射</div>
  <div id="status">点击"启动"开始</div>
  
  <div class="container">
    <video id="video" width="640" height="480" playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>
    <div id="fps">FPS: 0</div>
  </div>
  
  <div class="controls">
    <button id="startBtn">启动</button>
    <button id="stopBtn" disabled>停止</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');
    const fpsEl = document.getElementById('fps');
    
    let faceMesh = null;
    let isRunning = false;
    let stream = null;
    let frameCount = 0;
    let lastTime = performance.now();

    function updateFps() {
      frameCount++;
      const now = performance.now();
      if (now - lastTime >= 1000) {
        fpsEl.textContent = `FPS: ${frameCount}`;
        frameCount = 0;
        lastTime = now;
      }
    }

    // 绘制单个点
    function drawPoint(x, y, color, radius = 2) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    // 绘制连线
    function drawLine(x1, y1, x2, y2, color, lineWidth = 1) {
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    // 绘制面部网格
    function drawFaceMesh(landmarks) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      if (!landmarks || landmarks.length < 468) return;
      
      status.textContent = `✅ 追踪中 - ${landmarks.length} 个点`;
      
      // 定义连接（MediaPipe 官方连接）
      const connections = [
        // 脸型轮廓
        [10, 338], [338, 297], [297, 332], [332, 284], [284, 251],
        [251, 389], [389, 356], [356, 454], [454, 323], [323, 361],
        [361, 288], [288, 397], [397, 365], [365, 379], [379, 378],
        [378, 400], [400, 377], [377, 152], [152, 148], [148, 176],
        [176, 149], [149, 150], [150, 136], [136, 172], [172, 58],
        [58, 132], [132, 93], [93, 234], [234, 127], [127, 162],
        [162, 21], [21, 54], [54, 103], [103, 67], [67, 109], [109, 10],
        
        // 嘴巴外圈
        [61, 146], [146, 91], [91, 181], [181, 84], [84, 17],
        [17, 314], [314, 405], [405, 321], [321, 375], [375, 291],
        [291, 409], [409, 270], [270, 269], [269, 267], [267, 0],
        [0, 37], [37, 39], [39, 40], [40, 185], [185, 61],
        
        // 嘴巴内圈
        [78, 191], [191, 80], [80, 81], [81, 82], [82, 13],
        [13, 312], [312, 311], [311, 310], [310, 415], [415, 308],
        [308, 324], [324, 318], [318, 402], [402, 317], [317, 14],
        [14, 87], [87, 178], [178, 88], [88, 95], [95, 78],
        
        // 鼻子
        [1, 2], [2, 97], [97, 98], [98, 126], [126, 246],
        [246, 197], [197, 195], [195, 6],
        [4, 5], [5, 44], [44, 45], [45, 46], [46, 106],
        [106, 122], [122, 123], [123, 114], [114, 4],
        
        // 左眼（上）
        [33, 160], [160, 158], [158, 159], [159, 157], [157, 173], [173, 133],
        // 左眼（下）
        [33, 7], [7, 163], [163, 144], [144, 145], [145, 153], [153, 133],
        
        // 右眼（上）
        [362, 385], [385, 387], [387, 388], [388, 466], [466, 263],
        // 右眼（下）
        [362, 382], [382, 381], [381, 380], [380, 374], [374, 373], [373, 362],
        
        // 左眉毛
        [70, 63], [63, 105], [105, 66], [66, 107], [107, 55], [55, 65],
        [65, 52], [52, 53], [53, 46],
        
        // 右眉毛
        [300, 293], [293, 291], [291, 334], [334, 296], [296, 336], [336, 300]
      ];
      
      // 绘制连接线（绿色）
      connections.forEach(([i, j]) => {
        if (landmarks[i] && landmarks[j]) {
          const x1 = landmarks[i].x * canvas.width;
          const y1 = landmarks[i].y * canvas.height;
          const x2 = landmarks[j].x * canvas.width;
          const y2 = landmarks[j].y * canvas.height;
          
          drawLine(x1, y1, x2, y2, '#00FF00', 1.5);
        }
      });
      
      // 绘制关键点（红色）
      for (let i = 0; i < landmarks.length; i += 4) {
        if (landmarks[i]) {
          const x = landmarks[i].x * canvas.width;
          const y = landmarks[i].y * canvas.height;
          drawPoint(x, y, '#FF0000', 2);
        }
      }
      
      // 高亮关键点（黄色大点）
      const keyPoints = [33, 133, 362, 263, 61, 291, 1, 10, 152, 234];
      keyPoints.forEach(i => {
        if (landmarks[i]) {
          const x = landmarks[i].x * canvas.width;
          const y = landmarks[i].y * canvas.height;
          drawPoint(x, y, '#FFFF00', 5);
        }
      });
    }

    // 初始化
    async function initFaceMesh() {
      status.textContent = '🔄 正在加载模型...';
      
      faceMesh = new FaceMesh({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }
      });

      faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: false,
        minDetectionConfidence: 0.3,
        minTrackingConfidence: 0.3
      });

      faceMesh.onResults((results) => {
        updateFps();
        
        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
          drawFaceMesh(results.multiFaceLandmarks[0]);
        } else {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          status.textContent = '🔍 未检测到面部';
        }
      });
    }

    // 启动
    async function start() {
      try {
        if (typeof FaceMesh === 'undefined') {
          throw new Error('FaceMesh 库未加载');
        }
        
        if (!faceMesh) {
          await initFaceMesh();
        }
        
        stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480 }
        });
        
        video.srcObject = stream;
        await new Promise(resolve => {
          video.onloadedmetadata = () => {
            video.play();
            resolve();
          };
        });
        
        isRunning = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        status.textContent = '✅ 运行中';
        
        processFrame();
        
      } catch (error) {
        status.textContent = '❌ 错误：' + error.message;
      }
    }

    // 处理帧
    async function processFrame() {
      if (!isRunning) return;
      await faceMesh.send({ image: video });
      requestAnimationFrame(processFrame);
    }

    // 停止
    function stop() {
      isRunning = false;
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      video.srcObject = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      startBtn.disabled = false;
      stopBtn.disabled = true;
      status.textContent = '已停止';
    }

    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click', stop);
  </script>
</body>
</html>
