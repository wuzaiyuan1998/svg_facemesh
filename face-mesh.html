<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPipe Face Mesh - 面部捕捉</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    
    h1 {
      color: white;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .subtitle {
      color: #e0e7ff;
      margin-bottom: 20px;
      font-size: 14px;
    }
    
    .container {
      position: relative;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    .video-wrapper {
      position: relative;
    }
    
    #videoInput {
      display: block;
      transform: scaleX(-1);
    }
    
    #canvasOutput {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1);
    }
    
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: bold;
    }
    
    #startBtn {
      background: #10b981;
      color: white;
    }
    
    #startBtn:hover {
      background: #059669;
    }
    
    #startBtn:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    
    #stopBtn {
      background: #ef4444;
      color: white;
    }
    
    #stopBtn:hover {
      background: #dc2626;
    }
    
    .toggle-btn {
      background: #667eea;
      color: white;
    }
    
    .toggle-btn.active {
      background: #059669;
      box-shadow: 0 0 10px #059669;
    }
    
    .info {
      margin-top: 20px;
      background: white;
      border-radius: 15px;
      padding: 20px;
      max-width: 640px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    .info h3 {
      color: #667eea;
      margin-bottom: 10px;
    }
    
    .info ul {
      margin-left: 20px;
      color: #4b5563;
    }
    
    .info li {
      margin: 5px 0;
    }
    
    .fps-counter {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      padding: 5px 10px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 12px;
      z-index: 10;
    }
    
    #status {
      color: #ffd700;
      margin-bottom: 15px;
      font-size: 14px;
      text-align: center;
    }
    
    .stats {
      margin-top: 15px;
      padding: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      color: white;
      font-size: 12px;
    }
    
    .stats span {
      margin: 0 10px;
    }
  </style>
</head>
<body>
  <h1>🎭 MediaPipe Face Mesh</h1>
  <div class="subtitle">468 个面部关键点实时追踪</div>
  <div id="status">点击"启动摄像头"开始</div>
  
  <div class="container">
    <div class="video-wrapper">
      <video id="videoInput" playsinline width="640" height="480"></video>
      <canvas id="canvasOutput" width="640" height="480"></canvas>
      <div class="fps-counter" id="fpsCounter">FPS: 0</div>
    </div>
  </div>
  
  <div class="controls">
    <button id="startBtn">🎬 启动摄像头</button>
    <button id="stopBtn" disabled>⏹ 停止</button>
  </div>
  
  <div class="controls">
    <button class="toggle-btn active" data-feature="mesh">🕸️ 网格</button>
    <button class="toggle-btn active" data-feature="eyes">👁️ 眼睛</button>
    <button class="toggle-btn active" data-feature="eyebrows">眉毛</button>
    <button class="toggle-btn active" data-feature="nose">👃 鼻子</button>
    <button class="toggle-btn active" data-feature="mouth">👄 嘴巴</button>
    <button class="toggle-btn active" data-feature="face">😊 脸型</button>
    <button class="toggle-btn active" data-feature="iris">🔵 虹膜</button>
  </div>
  
  <div class="stats" id="stats">
    <span>关键点：0/468</span>
    <span>置信度：0%</span>
  </div>
  
  <div class="info">
    <h3>📖 使用说明</h3>
    <ul>
      <li>点击"启动摄像头"允许浏览器访问摄像头</li>
      <li>将脸部对准摄像头，确保光线充足</li>
      <li>468 个关键点会实时追踪你的面部表情</li>
      <li>点击上方按钮切换显示不同的面部特征</li>
      <li>支持：眨眼、张嘴、挑眉等表情识别</li>
    </ul>
    <h3 style="margin-top: 15px;">🔧 技术栈</h3>
    <ul>
      <li><strong>MediaPipe FaceMesh</strong> - Google 官方面部网格追踪（468 个点）</li>
      <li><strong>Canvas 2D</strong> - 实时绘制面部网格</li>
      <li><strong>纯前端</strong> - 无需后端，浏览器原生运行</li>
    </ul>
  </div>

  <!-- MediaPipe FaceMesh -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

  <script>
    // DOM 元素
    const videoElement = document.getElementById('videoInput');
    const canvasElement = document.getElementById('canvasOutput');
    const canvasCtx = canvasElement.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusElement = document.getElementById('status');
    const fpsCounter = document.getElementById('fpsCounter');
    const toggleBtns = document.querySelectorAll('.toggle-btn');
    const statsEl = document.getElementById('stats');
    
    let faceMesh = null;
    let isRunning = false;
    let animationFrameId = null;
    let mediaStream = null;
    let frameCount = 0;
    let lastFpsTime = performance.now();
    
    // 显示选项
    const showFeatures = {
      mesh: true,
      eyes: true,
      eyebrows: true,
      nose: true,
      mouth: true,
      face: true,
      iris: true
    };

    // 面部关键点索引定义
    const FACEMESH_LIPS = [
      [61,146],[146,91],[91,181],[181,84],[84,17],
      [17,314],[314,405],[405,321],[321,375],[375,291],
      [61,185],[185,40],[40,39],[39,37],[37,0],
      [0,267],[267,269],[269,270],[270,409],[409,291],
      [78,95],[95,88],[88,178],[178,87],[87,14],
      [14,317],[317,402],[402,318],[318,324],[324,308],
      [78,191],[191,80],[80,81],[81,82],[82,13],
      [13,312],[312,311],[311,310],[310,415],[415,308]
    ];

    const FACEMESH_LEFT_EYE = [
      [33,7],[7,163],[163,144],[144,145],[145,153],
      [153,154],[154,155],[155,133],[133,173],[173,157],
      [157,158],[158,159],[159,160],[160,33]
    ];

    const FACEMESH_RIGHT_EYE = [
      [362,382],[382,381],[381,380],[380,374],[374,373],
      [373,390],[390,249],[249,263],[263,466],[466,388],
      [388,387],[387,386],[386,385],[385,362]
    ];

    const FACEMESH_LEFT_EYEBROW = [
      [70,63],[63,105],[105,66],[66,107],
      [107,55],[55,65],[65,52],[52,53],[53,46]
    ];

    const FACEMESH_RIGHT_EYEBROW = [
      [300,293],[293,291],[291,334],[334,296],[296,336],
      [336,300]
    ];

    const FACEMESH_NOSE = [
      [1,2],[2,97],[97,98],[98,126],[126,246],
      [246,197],[197,195],[195,6],[6,197],
      [4,5],[5,44],[44,45],[45,46],[46,106],
      [106,122],[122,123],[123,114],[114,4]
    ];

    const FACEMESH_FACE_OVAL = [
      [10,338],[338,297],[297,332],[332,284],[284,251],
      [251,389],[389,356],[356,454],[454,323],[323,361],
      [361,288],[288,397],[397,365],[365,379],[379,378],
      [378,400],[400,377],[377,152],[152,148],[148,176],
      [176,149],[149,150],[150,136],[136,172],[172,58],
      [58,132],[132,93],[93,234],[234,127],[127,162],
      [162,21],[21,54],[54,103],[103,67],[67,109],
      [109,10],[10,151],[151,98],[98,124],[124,126]
    ];

    const FACEMESH_IRIS_LEFT = [[474,475],[475,476],[476,477],[477,474]];
    const FACEMESH_IRIS_RIGHT = [[469,470],[470,471],[471,472],[472,469]];

    // FPS 计数器
    function updateFps() {
      frameCount++;
      const now = performance.now();
      if (now - lastFpsTime >= 1000) {
        fpsCounter.textContent = `FPS: ${frameCount}`;
        frameCount = 0;
        lastFpsTime = now;
      }
    }

    // 更新统计信息
    function updateStats(landmarks) {
      if (!landmarks) {
        statsEl.innerHTML = '<span>关键点：0/468</span><span>置信度：0%</span>';
        return;
      }
      
      // FaceMesh 的 visibility 可能为 undefined，不检查或降低阈值
      const visibleCount = landmarks.filter(lm => !lm.visibility || lm.visibility > 0.1).length;
      const avgVisibility = landmarks.reduce((sum, lm) => sum + (lm.visibility || 1), 0) / landmarks.length;
      
      statsEl.innerHTML = `
        <span>关键点：${visibleCount}/468</span>
        <span>置信度：${(avgVisibility * 100).toFixed(1)}%</span>
      `;
    }

    // 绘制连接线
    function drawConnectors(landmarks, connections, color, lineWidth = 1) {
      canvasCtx.strokeStyle = color;
      canvasCtx.lineWidth = lineWidth;
      
      connections.forEach(([i, j]) => {
        // FaceMesh 的 visibility 可能为 undefined，直接使用坐标
        if (landmarks[i] && landmarks[j]) {
          const p1 = {
            x: landmarks[i].x * canvasElement.width,
            y: landmarks[i].y * canvasElement.height
          };
          const p2 = {
            x: landmarks[j].x * canvasElement.width,
            y: landmarks[j].y * canvasElement.height
          };
          
          canvasCtx.beginPath();
          canvasCtx.moveTo(p1.x, p1.y);
          canvasCtx.lineTo(p2.x, p2.y);
          canvasCtx.stroke();
        }
      });
    }

    // 绘制关键点
    function drawLandmarks(landmarks, indices, color, radius = 2) {
      canvasCtx.fillStyle = color;
      
      indices.forEach(i => {
        if (landmarks[i]) {
          const x = landmarks[i].x * canvasElement.width;
          const y = landmarks[i].y * canvasElement.height;
          
          canvasCtx.beginPath();
          canvasCtx.arc(x, y, radius, 0, 2 * Math.PI);
          canvasCtx.fill();
        }
      });
    }

    // 绘制完整网格（稀疏模式，避免太密集）
    function drawMesh(landmarks) {
      canvasCtx.strokeStyle = 'rgba(0, 255, 255, 0.3)';
      canvasCtx.lineWidth = 0.5;
      
      // 只绘制部分网格线（每隔几个点画一条）
      for (let i = 0; i < landmarks.length; i += 8) {
        for (let j = i + 1; j < Math.min(i + 8, landmarks.length); j++) {
          if (landmarks[i] && landmarks[j]) {
            const p1 = {
              x: landmarks[i].x * canvasElement.width,
              y: landmarks[i].y * canvasElement.height
            };
            const p2 = {
              x: landmarks[j].x * canvasElement.width,
              y: landmarks[j].y * canvasElement.height
            };
            
            canvasCtx.beginPath();
            canvasCtx.moveTo(p1.x, p1.y);
            canvasCtx.lineTo(p2.x, p2.y);
            canvasCtx.stroke();
          }
        }
      }
    }

    // 主绘制函数
    function drawFaceMesh(landmarks) {
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      if (!landmarks || landmarks.length < 468) return;
      
      // 1. 绘制网格背景
      if (showFeatures.mesh) {
        drawMesh(landmarks);
      }
      
      // 2. 绘制脸型轮廓
      if (showFeatures.face) {
        drawConnectors(landmarks, FACEMESH_FACE_OVAL, '#00FF00', 2);
      }
      
      // 3. 绘制眉毛
      if (showFeatures.eyebrows) {
        drawConnectors(landmarks, FACEMESH_LEFT_EYEBROW, '#FFA500', 2);
        drawConnectors(landmarks, FACEMESH_RIGHT_EYEBROW, '#FFA500', 2);
      }
      
      // 4. 绘制眼睛
      if (showFeatures.eyes) {
        drawConnectors(landmarks, FACEMESH_LEFT_EYE, '#0000FF', 2);
        drawConnectors(landmarks, FACEMESH_RIGHT_EYE, '#0000FF', 2);
        drawLandmarks(landmarks, [33, 133, 362, 263], '#FF0000', 4); // 眼角高亮
      }
      
      // 5. 绘制虹膜
      if (showFeatures.iris) {
        drawConnectors(landmarks, FACEMESH_IRIS_LEFT, '#00FFFF', 2);
        drawConnectors(landmarks, FACEMESH_IRIS_RIGHT, '#00FFFF', 2);
      }
      
      // 6. 绘制鼻子
      if (showFeatures.nose) {
        drawConnectors(landmarks, FACEMESH_NOSE, '#FFFF00', 2);
        drawLandmarks(landmarks, [1, 4, 5, 44, 45, 46], '#FFFF00', 3);
      }
      
      // 7. 绘制嘴巴
      if (showFeatures.mouth) {
        drawConnectors(landmarks, FACEMESH_LIPS, '#FF00FF', 2);
        drawLandmarks(landmarks, [61, 78, 84, 17, 291, 308, 324, 318], '#FF00FF', 4);
      }
      
      // 8. 绘制所有关键点（小红点）
      canvasCtx.fillStyle = 'rgba(255, 0, 0, 0.5)';
      for (let i = 0; i < landmarks.length; i += 4) {
        if (landmarks[i]) {
          const x = landmarks[i].x * canvasElement.width;
          const y = landmarks[i].y * canvasElement.height;
          canvasCtx.beginPath();
          canvasCtx.arc(x, y, 1.5, 0, 2 * Math.PI);
          canvasCtx.fill();
        }
      }
    }

    // 处理每一帧
    function processFrame() {
      if (!isRunning || !faceMesh) return;
      
      faceMesh.send({ image: videoElement });
      animationFrameId = requestAnimationFrame(processFrame);
    }

    // 初始化 FaceMesh
    function initFaceMesh() {
      console.log('🔧 初始化 MediaPipe FaceMesh...');
      
      faceMesh = new FaceMesh({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }
      });

      faceMesh.setOptions({
        maxNumFaces: 1,
        refineLandmarks: true, // 启用虹膜追踪
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      faceMesh.onResults((results) => {
        updateFps();
        
        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
          const landmarks = results.multiFaceLandmarks[0];
          drawFaceMesh(landmarks);
          updateStats(landmarks);
        } else {
          canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
          updateStats(null);
        }
      });
      
      console.log('✅ MediaPipe FaceMesh 初始化完成');
    }

    // 启动摄像头
    async function startCamera() {
      try {
        statusElement.textContent = '🔄 正在初始化...';
        
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error('您的浏览器不支持摄像头访问。');
        }
        
        if (!window.isSecureContext) {
          throw new Error('摄像头需要在安全上下文中运行（HTTPS 或 localhost）。');
        }
        
        if (!faceMesh) {
          initFaceMesh();
        }
        
        mediaStream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 640 },
            height: { ideal: 480 },
            facingMode: 'user'
          },
          audio: false
        });
        
        videoElement.srcObject = mediaStream;
        
        await new Promise((resolve) => {
          videoElement.onloadedmetadata = () => {
            videoElement.play();
            resolve();
          };
        });
        
        isRunning = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        statusElement.textContent = '✅ 正在运行 - 请面对摄像头';
        
        processFrame();
        
      } catch (error) {
        console.error('启动失败:', error);
        let errorMsg = error.message;
        
        if (error.name === 'NotAllowedError') {
          errorMsg = '您拒绝了摄像头访问权限。';
        } else if (error.name === 'NotFoundError') {
          errorMsg = '未找到摄像头设备。';
        }
        
        statusElement.textContent = '❌ 启动失败：' + errorMsg;
      }
    }

    // 停止摄像头
    function stopCamera() {
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }
      
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
      }
      
      if (videoElement.srcObject) {
        videoElement.srcObject = null;
      }
      
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      isRunning = false;
      startBtn.disabled = false;
      stopBtn.disabled = true;
      statusElement.textContent = '⏹ 已停止';
      updateStats(null);
    }

    // 切换显示选项
    toggleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const feature = btn.dataset.feature;
        showFeatures[feature] = !showFeatures[feature];
        btn.classList.toggle('active');
      });
    });

    // 事件监听
    startBtn.addEventListener('click', startCamera);
    stopBtn.addEventListener('click', stopCamera);
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && isRunning) {
        stopCamera();
      }
    });

    window.addEventListener('beforeunload', () => {
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
      }
      if (animationFrameId) {
        cancelAnimationFrame(animationFrameId);
      }
    });
  </script>
</body>
</html>
