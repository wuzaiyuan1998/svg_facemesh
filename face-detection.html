<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaPipe Face Detection - 轻量面部检测</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 { color: white; margin-bottom: 10px; }
    .subtitle { color: #e0e7ff; margin-bottom: 20px; font-size: 14px; }
    
    .container {
      position: relative;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    video, canvas {
      display: block;
      transform: scaleX(-1);
    }
    
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    
    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #10b981;
      color: white;
      font-weight: bold;
    }
    
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    
    #status {
      color: #ffd700;
      margin: 15px 0;
      font-size: 14px;
      text-align: center;
    }
    
    #fps {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      padding: 5px 10px;
      border-radius: 5px;
      font-family: monospace;
      z-index: 10;
    }
    
    .info {
      margin-top: 20px;
      background: white;
      border-radius: 15px;
      padding: 20px;
      max-width: 640px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    .info h3 { color: #667eea; margin-bottom: 10px; }
    .info ul { margin-left: 20px; color: #4b5563; }
  </style>
</head>
<body>
  <h1>😊 MediaPipe Face Detection</h1>
  <div class="subtitle">轻量版 - 快速面部检测（非 468 点）</div>
  <div id="status">点击"启动"开始</div>
  
  <div class="container">
    <video id="video" width="640" height="480" playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>
    <div id="fps">FPS: 0</div>
  </div>
  
  <div class="controls">
    <button id="startBtn">启动</button>
    <button id="stopBtn" disabled>停止</button>
  </div>
  
  <div class="info">
    <h3>📖 说明</h3>
    <ul>
      <li>使用 MediaPipe Face Detection（轻量模型）</li>
      <li>检测面部位置 + 6 个关键点（眼睛、鼻子、嘴巴）</li>
      <li>模型仅 5MB，比 FaceMesh（50MB）小 10 倍</li>
      <li>适合低性能设备或快速检测</li>
    </ul>
  </div>

  <!-- MediaPipe Face Detection -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>
  
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');
    const fpsEl = document.getElementById('fps');
    
    let faceDetection = null;
    let isRunning = false;
    let stream = null;
    let frameCount = 0;
    let lastTime = performance.now();

    function updateFps() {
      frameCount++;
      const now = performance.now();
      if (now - lastTime >= 1000) {
        fpsEl.textContent = `FPS: ${frameCount}`;
        frameCount = 0;
        lastTime = now;
      }
    }

    // 绘制检测结果
    function drawDetections(detections) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      if (!detections || detections.length === 0) {
        status.textContent = '🔍 未检测到面部';
        return;
      }
      
      status.textContent = `✅ 检测到 ${detections.length} 张脸`;
      
      detections.forEach(detection => {
        // 绘制边界框
        const bbox = detection.boundingBox;
        ctx.strokeStyle = '#00FF00';
        ctx.lineWidth = 3;
        ctx.strokeRect(bbox.xMin, bbox.yMin, bbox.width, bbox.height);
        
        // 绘制关键点
        detection.landmarks.forEach((landmark, i) => {
          const x = landmark.x * canvas.width;
          const y = landmark.y * canvas.height;
          
          // 不同颜色绘制不同关键点
          const colors = ['#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', '#00FFFF'];
          ctx.fillStyle = colors[i % colors.length];
          ctx.beginPath();
          ctx.arc(x, y, 8, 0, Math.PI * 2);
          ctx.fill();
        });
        
        // 显示置信度
        const confidence = (detection.score * 100).toFixed(1);
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '16px Arial';
        ctx.fillText(`${confidence}%`, bbox.xMin, bbox.yMin - 10);
      });
    }

    // 初始化
    async function initFaceDetection() {
      status.textContent = '🔄 正在加载模型...';
      
      faceDetection = new FaceDetection({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`;
        }
      });

      faceDetection.setOptions({
        model: 'short', // 轻量模型（还有'short'和'full'可选）
        minDetectionConfidence: 0.5
      });

      faceDetection.onResults((results) => {
        updateFps();
        drawDetections(results.detections);
      });
    }

    // 启动
    async function start() {
      try {
        if (typeof FaceDetection === 'undefined') {
          throw new Error('FaceDetection 库未加载');
        }
        
        if (!faceDetection) {
          await initFaceDetection();
        }
        
        stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480 }
        });
        
        video.srcObject = stream;
        await new Promise(resolve => {
          video.onloadedmetadata = () => {
            video.play();
            resolve();
          };
        });
        
        isRunning = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        status.textContent = '✅ 运行中';
        
        processFrame();
        
      } catch (error) {
        status.textContent = '❌ 错误：' + error.message;
      }
    }

    // 处理帧
    async function processFrame() {
      if (!isRunning) return;
      await faceDetection.send({ image: video });
      requestAnimationFrame(processFrame);
    }

    // 停止
    function stop() {
      isRunning = false;
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      video.srcObject = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      startBtn.disabled = false;
      stopBtn.disabled = true;
      status.textContent = '已停止';
    }

    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click', stop);
  </script>
</body>
</html>
