<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>姿态识别 - 简化版</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    h1 {
      color: #fff;
      margin-bottom: 20px;
    }
    
    .video-container {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,255,255,0.3);
    }
    
    video {
      display: block;
      transform: scaleX(-1);
    }
    
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      transform: scaleX(-1);
    }
    
    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    
    button {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #00d4aa;
      color: #000;
      font-weight: bold;
    }
    
    button:disabled {
      background: #666;
      cursor: not-allowed;
    }
    
    #status {
      color: #00d4aa;
      margin: 10px 0;
      font-size: 14px;
    }
    
    #fps {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      padding: 5px 10px;
      border-radius: 5px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <h1>🎭 姿态识别演示</h1>
  <div id="status">点击按钮启动摄像头</div>
  
  <div class="video-container">
    <video id="video" width="640" height="480" playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>
    <div id="fps">FPS: 0</div>
  </div>
  
  <div class="controls">
    <button id="startBtn">启动</button>
    <button id="stopBtn" disabled>停止</button>
  </div>

  <!-- 引入 MediaPipe 库 -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.min.js"></script>
  
  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const status = document.getElementById('status');
    const fpsEl = document.getElementById('fps');
    
    let pose = null;
    let isRunning = false;
    let stream = null;
    let frameCount = 0;
    let lastTime = performance.now();

    // FPS 计算
    function updateFps() {
      frameCount++;
      const now = performance.now();
      if (now - lastTime >= 1000) {
        fpsEl.textContent = `FPS: ${frameCount}`;
        frameCount = 0;
        lastTime = now;
      }
    }

    // 初始化 Pose
    async function initPose() {
      status.textContent = '正在加载模型...';
      console.log('Loading Pose library...');
      
      // 检查库是否加载
      if (typeof Pose === 'undefined') {
        throw new Error('Pose 库未加载，请检查网络连接');
      }
      
      pose = new Pose({
        locateFile: (file) => {
          return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
        }
      });

      pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      pose.onResults((results) => {
        updateFps();
        
        // 清空画布
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (results.poseLandmarks) {
          // 绘制连接线
          drawingUtils.drawConnectors(
            ctx,
            results.poseLandmarks,
            POSE_CONNECTIONS,
            { color: '#00FF00', lineWidth: 3 }
          );
          
          // 绘制关键点
          drawingUtils.drawLandmarks(
            ctx,
            results.poseLandmarks,
            { color: '#FF0000', lineWidth: 2, radius: 5 }
          );
        }
      });
      
      status.textContent = '模型加载完成';
      console.log('Pose initialized');
    }

    // 启动摄像头
    async function start() {
      try {
        if (!pose) {
          await initPose();
        }
        
        stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 640, height: 480 }
        });
        
        video.srcObject = stream;
        await new Promise(resolve => {
          video.onloadedmetadata = () => {
            video.play();
            resolve();
          };
        });
        
        isRunning = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        status.textContent = '运行中 - 在摄像头前移动';
        
        // 开始处理
        processFrame();
        
      } catch (error) {
        console.error(error);
        status.textContent = '错误：' + error.message;
      }
    }

    // 处理帧
    async function processFrame() {
      if (!isRunning) return;
      
      await pose.send({ image: video });
      requestAnimationFrame(processFrame);
    }

    // 停止
    function stop() {
      isRunning = false;
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      video.srcObject = null;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      startBtn.disabled = false;
      stopBtn.disabled = true;
      status.textContent = '已停止';
    }

    startBtn.addEventListener('click', start);
    stopBtn.addEventListener('click', stop);
  </script>
</body>
</html>
